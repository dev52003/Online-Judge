{% extends "base.html" %}
{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="card auth-card">
    <div class="card-body text-center">
        <h2 class="card-title mb-4">You've been logged out</h2>
        <p class="mb-4">Thanks for using Online Judge. Come back soon!</p>
        <div class="d-grid gap-2">
            <a href="{% url 'login' %}" class="btn btn-primary">Login Again</a>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Return Home</a>
        </div>
    </div>
</div>
{% endblock %}m
